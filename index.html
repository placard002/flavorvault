<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folio — Recipes That Tell a Story</title>
    <meta name="description" content="Discover baking, cooking, and dessert recipes on Folio — a warm, editorial recipe platform." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --color-bg: #FAF8F5;
        --color-text: #1C1410;
        --color-amber: #D4830A;
        --color-sage: #7A9E7E;
        --color-rose: #E8B4A0;
        --color-amber-light: #FDF3E3;
        --color-sage-light: #EBF3EC;
        --color-rose-light: #FDF0EB;
        --color-border: #E8E2D9;
        --color-muted: #8C7B6B;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .font-display {
        font-family: 'Fraunces', Georgia, serif;
      }

      h1, h2, h3 {
        font-family: 'Fraunces', Georgia, serif;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--color-bg); }
      ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-muted); }

      /* Focus ring */
      *:focus-visible {
        outline: 2px solid var(--color-amber);
        outline-offset: 2px;
        border-radius: 4px;
      }

      /* Transitions */
      a, button { transition: all 0.15s ease; }

      /* Category badge colors */
      .badge-baking {
        background: var(--color-amber);
        color: #fff;
      }
      .badge-cooking {
        background: var(--color-sage);
        color: #fff;
      }
      .badge-desserts {
        background: var(--color-rose);
        color: var(--color-text);
      }

      /* Ingredient badge — textured amber */
      .ingredient-badge {
        background: var(--color-amber);
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        letter-spacing: 0.02em;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), inset 0 -1px 0 rgba(0,0,0,0.1);
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.04) 2px,
          rgba(255,255,255,0.04) 4px
        );
      }

      /* Recipe card hover */
      .recipe-card {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .recipe-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 32px rgba(28,20,16,0.12);
      }

      /* Step timeline */
      .step-line {
        position: absolute;
        left: 19px;
        top: 44px;
        bottom: 0;
        width: 2px;
        background: linear-gradient(to bottom, var(--color-amber), var(--color-border));
      }

      .step-circle {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--color-amber);
        color: #fff;
        font-family: 'Fraunces', serif;
        font-weight: 700;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(212,131,10,0.3);
      }

      /* Hero gradient */
      .hero-gradient {
        background: linear-gradient(135deg, #1C1410 0%, #3D2B1F 40%, #5C3D1E 100%);
      }

      /* Smooth image load */
      img {
        transition: opacity 0.3s ease;
      }

      /* Auth tabs */
      .auth-tab-active {
        color: var(--color-amber);
        border-bottom: 2px solid var(--color-amber);
      }

      /* Filter chip */
      .filter-chip {
        border: 1.5px solid var(--color-border);
        color: var(--color-muted);
        background: #fff;
        transition: all 0.15s ease;
      }
      .filter-chip:hover {
        border-color: var(--color-amber);
        color: var(--color-amber);
      }
      .filter-chip-active {
        border-color: var(--color-amber) !important;
        background: var(--color-amber-light) !important;
        color: var(--color-amber) !important;
        font-weight: 600;
      }

      /* Sticky sidebar */
      .ingredient-sidebar {
        position: sticky;
        top: 88px;
        max-height: calc(100vh - 100px);
        overflow-y: auto;
      }

      /* Line clamp */
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .line-clamp-3 {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* Nav active state */
      .nav-active {
        color: var(--color-amber);
      }

      /* Page transitions */
      .page-enter {
        animation: fadeIn 0.25s ease;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Skeleton loading */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .skeleton {
        background: linear-gradient(90deg, #e8e2d9 25%, #f0ede8 50%, #e8e2d9 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
